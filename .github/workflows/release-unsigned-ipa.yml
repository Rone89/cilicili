name: Release Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.0.0
        required: true
        default: v1.0.0
      release_notes:
        description: Version feature notes shown on the GitHub release
        required: true
        default: |
          - UI polish from the reference project.
          - Unsigned IPA built by GitHub Actions.
      prerelease:
        description: Mark this release as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build and release unsigned IPA
    runs-on: macos-26

    env:
      PROJECT: bili.xcodeproj
      SCHEME: bili
      CONFIGURATION: Release
      DERIVED_DATA: build/DerivedData
      OUTPUT_DIR: build/UnsignedIPA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: |
          set -euo pipefail

          if [ -d /Applications/Xcode_26.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          else
            echo "Xcode 26.4 was not found; using the runner default Xcode."
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show project schemes
        run: xcodebuild -list -project "$PROJECT"

      - name: Build unsigned app
        run: |
          set -euo pipefail
          mkdir -p build/logs

          xcodebuild clean build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            | tee build/logs/xcodebuild.log

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH="$(find "$DERIVED_DATA/Build/Products/${CONFIGURATION}-iphoneos" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found."
            exit 1
          fi

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR/Payload"
          cp -R "$APP_PATH" "$OUTPUT_DIR/Payload/"

          IPA_NAME="${SCHEME}-${{ inputs.version }}-unsigned.ipa"
          IPA_PATH="$GITHUB_WORKSPACE/$OUTPUT_DIR/$IPA_NAME"
          cd "$OUTPUT_DIR"
          /usr/bin/ditto -c -k --keepParent Payload "$IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bili-unsigned-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: build/logs
          if-no-files-found: ignore

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          files: ${{ env.IPA_PATH }}
