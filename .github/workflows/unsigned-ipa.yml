name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          ls -1 /Applications | grep -E '^Xcode' || true
          if [ -d "/Applications/Xcode_26.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app
          elif [ -d "/Applications/Xcode_26.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app
          elif [ -d "/Applications/Xcode_26.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          elif [ -d "/Applications/Xcode_26.1.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.1.1.app
          elif [ -d "/Applications/Xcode_26.0.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.1.app
          fi
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build app without signing
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="$RUNNER_TEMP/DerivedData"
          BUILD_DIR="$RUNNER_TEMP/build"
          xcodebuild \
            -project bili.xcodeproj \
            -scheme bili \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -allowProvisioningUpdates NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build
          APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products/Release-iphoneos" -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle was produced." >&2
            exit 1
          fi
          mkdir -p "$BUILD_DIR/Payload"
          cp -R "$APP_PATH" "$BUILD_DIR/Payload/"
          (cd "$BUILD_DIR" && zip -qry "$GITHUB_WORKSPACE/bili-unsigned.ipa" Payload)

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: bili-unsigned-ipa
          path: bili-unsigned.ipa
          if-no-files-found: error
